version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexxtech_backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-coreadmin}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexxtech_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
