version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexxtech_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nexxtechss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase_schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexxtech_backend
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/nexxtechss
      - PORT=8000
      - JWT_SECRET=super_secret_jwt_key
      - ADMIN_USERNAME=coreadmin
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexxtech_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
